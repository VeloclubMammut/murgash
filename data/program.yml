title : "ПРОГРАМА НА СЪСТЕЗАНИЕТО"
content: |-
      <h3>ИЗИСКВАНИЯ КЪМ СЪСТЕЗАТЕЛИТЕ</h3>
      <h3>ВСЕКИ СЪСТЕЗАТЕЛ Е ДЛЪЖЕН:</h3>
      <ul>
      <li>да e екипиран с каска и ръкавици</li>
      <li>да e попълнил декларация за физическо здраве и умения с велосипед</li>
      <li>ако не е навършил 18 години - при взимане на състезателния номер да представи писмено съгласие за участие от родител/настойник. Номера се дават само срещу представена декларация!</li>
      <li>да участва с изправен планински велосипед</li>
      <li>да спазва правилника за движение по пътищата</li>
      <li>да спазва стриктно указанията на маршалите и съдиите</li>
      <li>да преминава през всички контролни пунктове (при липса на дори един, резултатът на състезателя не се зачита в класирането)</li>
      <li>да преминава само по маркираното трасе</li>
      <li>да финишира с велосипеда, с който стартира!</li>
      <li>Силно препоръчително е състезателите да носят в себе си мобилен телефон със заредена батерия</li>
      </ul>

      <h3>НЕДЕЛЯ, 31 МАЙ 2026</h3>

      <dl>
        <dt><h3>ЗА ВСИЧКИ ТРАСЕТА</h3></dt>
        <dd>
          <ul>
          <li>09.00 ч. - проверка на номерата и екипировката /каски, номера, екипировка…т.н./</li>
          <li>09.45 ч. - инструктаж</li>
          <li>10.00 ч. - старт - с. Желява</li>
          <li>15.00 ч. - награждаване</li>
          </ul>

        </dd>
      </dl>
