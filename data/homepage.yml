# About
about:
  title: "About us"
  desc: |-
    # 15-ТА КУПА “МУРГАШ” - СЪСТЕЗАНИЕ ПО ПЛАНИНСКО КОЛОЕЗДЕНЕ В ДИСЦИПЛИНА КРОС КЪНТРИ МАРАТОН (XCM)


    ## КОГА И КЪДЕ?

    “КУПА МУРГАШ” ЩЕ СЕ ПРОВЕДЕ НА 27.92025 г Г. /Събота/, В ЖЕЛЯВА

    СТАРТ ЗА “ЕПИК” В 09:00 ЧАСА
    СТАРТ ЗА “КЛАСИК” 09:15 ЧАСА 
    И “ПИКНИК” В 09:30 ЧАСА
     
    МАРШРУТИ
    МУРГАШ ЕПИК- 62 КМ. 2505М. ПОЛОЖИТЕЛНА ДЕНИВЕЛАЦИЯ.
    По този маршрут ще вземат участие състезатели в категориите: 
    * Мъже
    * Жени
    * Мастърс

    ВКЛЮЧВА 4 /ЧЕТИРИ/ ИЗКАЧВАНИЯ:
    * Вр. Мургаш - дължина 17км., 1000м денивелация.
    * Потоп - дължина 4,5км., 400м. денивелация
    * Желява - дължина 6км., 600м. денивелация
    * Желява II - дължина 4км., 400м. денивелация
    Спускат се две пътеки:
    * " Желявската пътека"
    * " Скритата"
    * Останалите спускания са по черни пътища

    МУРГАШ КЛАСИК- 40КМ. 1348М. ПОЛОЖИТЕЛНА ДЕНИВЕЛАЦИЯ

    По този маршрут ще вземат участие състезатели в категория Хоби:
    * Мъже
    * Жени
    * Мастърс 40+
    * Юноши/Девойки старша възраст 16-17 г
    * е-байк

    ВКЛЮЧВА 1 /ЕДНО ИЗКАЧВАНЕ:
    Вр. Мургаш- дължина 17км., 1000м денивелация.
    Маршрутът е подходящ за средно и добре подготвени състезатели.

    МУРГАШ ПИКНИК - 13 КМ. 524М. ПОЛОЖИТЕЛНА ДЕНИВЕЛАЦИЯ
    По този маршрут ще вземат участие състезатели в категория Хоби:
    * Мъже
    * Жени
    * Мастерс
    * Момчета / Момичета Младша възраст (родени след 2010 година)
    * Момчета / Момичета Старша възраст (родени през 2008 и 2009 година)
    * Юноши/ Девойки младша възраст 15-16 г
    * Юноши/ Девойки старша възраст 17-18 г
    * Деца до 12 г с придружител
    Маршрутът е подходящ за средно подготвени състезатели.

    ВКЛЮЧВА 1 ИЗКАЧВАНЕ :
    9.9 км изкачване, след което се достига до добре познатата Желявска пътечка, бижуто на София, заради която колоездачи пътуват специално. 
    Организаторът си запазва правото да извършва промени по маршрутите!

    РЕГИСТРАЦИЯ, ТАКСИ, ЛИЦЕНЗИ И ЗАСТРАХОВКА


    Линк за регистрация: 
    👉 https://tracksport.live/e/kupa-murgas-2025#tickets

    КРАЙНИЯТ СРОК ЗА РЕГИСТРАЦИЯ Е 
    18ти ОКТОМВРИ 2025 Г В 24:00 ЧАСА

    ТАКСА ЗА УЧАСТИЕ:
    До 01.09.2025 ранна регистрация 50 лв (за трасе Пикник тази такса ще остане непроменена)
    До 20.09.2025 70 лв
    До 18.10.2025 80 лв без гаранция за тениска
    ЗАБЕЛЕЖКА- размерът на тениските е умален. Когато се регистрирате ще има поле за избор на размер. И още две важни уточнения
    * тениската ще даваме на финала на състезанието
    * ще я получите в избраният от вас размер само ако сте се регистрирали и платили стартова такса до 20.09.2025 г.

    ЛИЦЕНЗИ

    Ще има отделно класиране за лицензирани състезтели

    ЗАСТРАХОВКИ

    Всеки участник ще бъде застрахован за деня на състезанието

    КАТЕГОРИИ, КЛАСИРАНЕ И НАГРАДИ:
    Класирането е индивидуално по групи. Награден фонд: предметни награди осигурени от нашите партньори:

    PAVÉ BIKE SHOP, SIEMENS, STROYRENT, ДИЕМ, DR. KESKIN, ОЛИМП, ЕФЕКТ, АВИТЕЛ, ISOSTAR, EASYPAY, EUROINS, TRACKSPORT.live, MTB-BG

         
    ПРОГРАМА НА СЪСТЕЗАНИЕТО
    Събота, 27 Септември 2025
    ЗА ЕПИК
    * 08.00 ч. проверка на номерата и екипировката - участниците трябва да са на старта за проверка /каски, номера, екипировка…т.н./ и инструктаж!
    * 08.30 ч.- инструктаж
    * 09.00 ч. – старт - с.Желява
    * 14.00 ч. - финал на най-бързите
    * 16.00 ч.- награждаване.

    КОНТРОЛНИ ВРЕМЕНА ЗА ЕПИК:

    Имайте предвид, че с оглед на условията преди състезанието са възможни промени на контролните времена, за което ще бъдете своевременно уведомени!

    ￼
    GPX файл: https://shared.gurumaps.app/2c4d1a59-b4ab-4668-a0a5-e9085cec7264.html

    ЗА КЛАСИК
    * 08.00 ч. проверка на номерата и екипировката - участниците трябва да са на старта за проверка /каски, номера, екипировка…т.н./ и инструктаж!
    * 09.05 ч.- инструктаж
    * 09.15 ч. – старт – с.Желява
    * 14.00 ч. - финал на най-бързите
    * 16.00 ч.- награждаване.
    * 
    КОНТРОЛНИ ВРЕМЕНА ЗА КЛАСИК:
    * Старт 09:15
    * Хижа Мургаш 12:00

    GPX файл: 

    ЗА ПИКНИК
    * 08.00 ч. проверка на номерата и екипировката - участниците трябва да са на старта за проверка /каски, номера, екипировка…т.н./ и инструктаж!
    * 09.20 ч.- инструктаж
    * 09.30 ч.- старт 
    * 11.30 ч. - финал на най-бързите
    * 16.00 ч.- награждаване.

    ПИКНИК НЯМА КОНТРОЛНО ВРЕМЕ
    GPX файл: 

    ИЗИСКВАНИЯ КЪМ СЪСТЕЗАТЕЛИТЕ
    ВСЕКИ СЪСТЕЗАТЕЛ Е ДЛЪЖЕН:
    * да e екипиран с каска и ръкавици
    * да e попълнил декларация за физическо здраве и умения с велосипед
    * ако не е навършил 18 години - при взимане на състезателния номер да представи писмено съгласие за участие от родител/настойник. Номера се дават само срещу представена декларация!
    * да участва с изправен планински велосипед
    * да спазва правилника за движение по пътищата
    * да спазва стриктно указанията на маршалите и съдиите
    * да преминава през всички контролни пунктове (при липса на дори един, резултатът на състезателя не се зачита в класирането)
    * да преминава само по маркираното трасе
    * да финишира с велосипеда, с който стартира!
    * Силно препоръчително е състезателите да носят в себе си мобилен телефон със"
