# About
about:
  title: "About us"
  desc: >
      # КУПА МУРГАШ 2025

      **Дата:** 27.09.2025 г  
      **16-ТА КУПА “МУРГАШ”**  
      **КРОС КЪНТРИ МАРАТОН (XCM)**  
      **СЪСТЕЗАНИЕ ПО ПЛАНИНСКО КОЛОЕЗДЕНЕ**

      ---

      ## Трасета
      - **62 км – ЕПИК**
      - **40 км – КЛАСИК**
      - **13 км – ПИКНИК**

      ---

      ## Кога и къде?
      - **СТАРТ “ЕПИК”** – 09:00 ч.  
      - **СТАРТ “КЛАСИК”** – 09:15 ч.  
      - **СТАРТ “ПИКНИК”** – 09:30 ч.  
      📍 В центъра на с. Желява  

      ---

      ## Маршрути

      ### МУРГАШ ЕПИК – 62 км / 2505 м D+
      Категории:  
      - Мъже (19 – 39 г.)  
      - Жени (19 – 39 г.)  
      - Мастърс Мъже (40+)  
      - Мастърс Жени (40+)  

      **Включва 4 изкачвания:**
      - Вр. Мургаш – 18 км, 1000 м  
      - Потоп – 4.5 км, 400 м  
      - Желява – 6 км, 600 м  
      - Желява II – 4 км, 400 м  

      **Спускания:**
      - „Желявската пътека“  
      - „Скритата“  
      - Останалите по черни пътища  

      ---

      ### МУРГАШ КЛАСИК – 40 км / 1348 м D+
      Категории: Хоби  
      - Мъже (19 – 39 г.)  
      - Жени (19 – 39 г.)  
      - Мастърс Мъже (40+)  
      - Мастърс Жени (40+)  
      - Юноши старша възраст (17 – 18 г.)  
      - Девойки старша възраст (17 – 18 г.)  
      - Юноши младша възраст (15 – 16 г.)  
      - Девойки младша възраст (15 – 16 г.)  
      - Е-байк  

      **Включва 1 изкачване:**
      - Вр. Мургаш – 18 км, 1000 м  

      ---

      ### МУРГАШ ПИКНИК – 13 км / 524 м D+
      Категории: Хоби  
      - Мъже (19+)  
      - Жени (19+)  
      - Юноши старша възраст (17 – 18 г.)  
      - Девойки старша възраст (17 – 18 г.)  
      - Юноши младша възраст (15 – 16 г.)  
      - Девойки младша възраст (15 – 16 г.)  
      - Момчета (13 – 14 г.)  
      - Момичета (13 – 14 г.)  
      - Деца до 12 г. с придружител  

      **Включва 1 изкачване:**  
      - 9.9 км изкачване → Желявската пътека  

      ---

      ## Регистрация, лицензи и застраховка
      👉 [Регистрация](https://tracksport.live/e/kupa-murgas-2025)  

      **Краен срок:** 26.09.2025 г., 23:59 ч.  

      **Такса за участие:**
      - До 07.09.2025 – 60 лв (за „Пикник“ остава непроменена)  
      - До 19.09.2025 – 80 лв  
      - До 26.09.2025 – 100 лв  

      🎁 Първите 200 завършили получават елек.  

      ---

      ## Категории, класиране и награди
      - Класиране индивидуално по групи  
      - Предметни награди от партньорите  

      **Възможност за общо класиране:**
      - **Мургаш Епик 62 км + Джуренец Куест 55 км** → Мъже/Жени  
      - **Мургаш Класик 40 км + Джуренец Куест 35 км** → Мъже/Жени/Ветерани/Юноши до 18 г./Е-байк  

      \* Е-байк с подпомагане до 25 км/ч  

      ---

