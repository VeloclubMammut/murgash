      ## Изисквания към състезателите
      Всеки състезател е длъжен:
      - Да е екипиран с каска и ръкавици  
      - Да е попълнил декларация за физическо здраве  
      - Ако е под 18 г. – писмено съгласие от родител/настойник  
      - Да участва с изправен планински велосипед  
      - Да спазва правилника за движение по пътищата  
      - Да следва указанията на маршалите и съдиите  
      - Да преминава през всички контролни пунктове  
      - Да се движи само по маркираното трасе  
      - Да финишира със същия велосипед  

      📱 Препоръчително: мобилен телефон със заредена батерия  

