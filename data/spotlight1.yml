  # 🏆 КУПА МУРГАШ 2025  

  **Дата:** 27.09.2025 г.  
  **16-та КУПА „МУРГАШ“**  
  **Крос кънтри маратон (XCM)**  
  **Състезание по планинско колоездене**  

  ---

  ## 🚴‍♂️ Трасета
  - **62 км Епик**  
  - **40 км Класик**  
  - **13 км Пикник**  

  ---

  ## 📍 Кога и къде?  
  - **Старт “Епик”** – 09:00 ч.  
  - **Старт “Класик”** – 09:15 ч.  
  - **Старт “Пикник”** – 09:30 ч.  
  📍 **Място:** Центъра на с. Желява  

  ---

  ## 🗺 Маршрути

  ### **Мургаш Епик** – 62 км, 2505 м положителна денивелация  
  **Категории:**
  - Мъже (19–39 г.)  
  - Жени (19–39 г.)  
  - Мастърс Мъже (40+)  
  - Мастърс Жени (40+)  

  **Изкачвания (4):**
  - Вр. Мургаш – 18 км, 1000 м  
  - Потоп – 4,5 км, 400 м  
  - Желява – 6 км, 600 м  
  - Желява II – 4 км, 400 м  

  **Спускания:**
  - „Желявската пътека“  
  - „Скритата“  
  - Останалите – по черни пътища  

  ---

  ### **Мургаш Класик** – 40 км, 1348 м положителна денивелация  
  **Категории (Хоби):**
  - Мъже (19–39 г.)  
  - Жени (19–39 г.)  
  - Мастърс Мъже (40+)  
  - Мастърс Жени (40+)  
  - Юноши старша (17–18 г.)  
  - Девойки старша (17–18 г.)  
  - Юноши младша (15–16 г.)  
  - Девойки младша (15–16 г.)  
  - Е-байк  

  **Изкачване (1):**
  - Вр. Мургаш – 18 км, 1000 м  

  ---

  ### **Мургаш Пикник** – 13 км, 524 м положителна денивелация  
  **Категории (Хоби):**
  - Мъже (19+)  
  - Жени (19+)  
  - Юноши старша (17–18 г.)  
  - Девойки старша (17–18 г.)  
  - Юноши младша (15–16 г.)  
  - Девойки младша (15–16 г.)  
  - Момчета (13–14 г.)  
  - Момичета (13–14 г.)  
  - Деца до 12 г. с придружител  

  **Изкачване:**  
  - 9.9 км → до „Желявската пътека“ – бижуто на София  

  ---

  ## 📝 Регистрация, лицензи и застраховка  
  👉 [Регистрация тук](https://tracksport.live/e/kupa-murgas-2025)  

  **Краен срок:** 26.09.2025, 23:59 ч.  

  **Такси:**
  - До 07.09.2025 – 60 лв (Пикник остава винаги 60 лв)  
  - До 19.09.2025 – 80 лв  
  - До 26.09.2025 – 100 лв  

  🎁 Първите **200 регистрирани и завършили** получават **елек**!  

  ---

  ## 🏅 Категории, класиране и награди  
  - Класиране по групи  
  - Награден фонд: предметни награди от партньорите  

  **Дву-дневно участие:**  
  - **Мургаш Епик (62 км) + Джуренец Куест (55 км)** → Мъже/Жени  
  - **Мургаш Класик (45 км) + Джуренец Куест (35 км)** → Мъже/Жени/Ветерани/Юноши до 18 г./Е-байк  

  📌 Общото класиране = сумирано време от двата дни  

  **Партньори:**  
  PAVÉ BIKE SHOP, SIEMENS, STROYRENT, ДИЕМ, ОЛИМП, ЕФЕКТ, АВИТЕЛ, ISOSTAR, EASYPAY, EUROINS, TRACKSPORT.live, MTB-BG  

