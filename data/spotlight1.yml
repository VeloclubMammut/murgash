  ## ⚠️ Изисквания към състезателите  
  Всеки състезател е длъжен:  
  - Да носи каска и ръкавици  
  - Да попълни декларация за здраве и умения  
  - Ако е под 18 г. – да представи съгласие от родител/настойник  
  - Да кара с изправен планински велосипед  
  - Да спазва правилника за движение и инструкциите на съдиите  
  - Да преминава през всички контролни пунктове  
  - Да се движи само по маркираното трасе  
  - Да финишира с велосипеда, с който стартира  

